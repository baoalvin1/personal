baseURL = 'https://alvinbao.com/'
locale = 'en-us'
title = 'Alvin Bao'
theme = 'PaperMod'

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[pagination]
pagerSize = 10

[minify]
disableXML = true

[params]
  env = 'production'
  description = "Alvin Bao"
  defaultTheme = 'auto'
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true

  [params.homeInfoParams]
    Title = "Hi, I'm Alvin 👋"
    Content = "Solving compute infrastructure problems @ Netflix."

  [[params.socialIcons]]
    name = 'github'
    url = 'https://github.com/baoalvin1'

  [[params.socialIcons]]
    name = 'linkedin'
    url = 'https://www.linkedin.com/in/alvinbao/'

[[menu.main]]
  identifier = 'posts'
  name = 'Posts'
  url = '/posts/'
  weight = 10

[markup]
  [markup.highlight]
    noClasses = false
